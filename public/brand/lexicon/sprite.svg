<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
  <!-- MiaMe Brand Lexicon · Ultra Master Hero Gate V3.
       Sharp brand icons (NOT system emoji) — one <symbol> per lexicon pair.
       viewBox 0 0 24 24, stroke 1.75, round caps/joins. Stroke icons inherit
       currentColor (colored via CSS); bolt + butterfly carry a fixed
       cyan→lime brand gradient. Consumed via <use href="sprite.svg#name">. -->
  <defs>
    <linearGradient id="lexEnergy" x1="4" y1="20" x2="20" y2="4" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#28C7E8"/>
      <stop offset="1" stop-color="#A5F35A"/>
    </linearGradient>
  </defs>

  <!-- ✅ L-finance · checkmark in a 320°-open ring -->
  <symbol id="check" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M9.1 4.3 A8.4 8.4 0 1 0 14.9 4.3"/>
    <path d="M8.2 12.4 11 15.2 15.9 8.6"/>
  </symbol>

  <!-- 🗽 L1 accent · torch of liberty with a 7-ray crown -->
  <symbol id="liberty" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 8.2c-1.7-1.9-1.7-3.4 0-5.4 1.7 2 1.7 3.5 0 5.4Z"/>
    <path d="M7.4 6.1 5.8 4.9M16.6 6.1 18.2 4.9M9.3 4.2 8.6 2.6M14.7 4.2 15.4 2.6M12 3.4V1.8"/>
    <path d="M12 8.4V15M9.6 15h4.8M8.8 18.4h6.4"/>
  </symbol>

  <!-- Ⓜ️ L2 · M (Space-Grotesk voice) inside a ring -->
  <symbol id="m-roundel" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="9.1"/>
    <path d="M7.7 15.6V8.4l4.3 4.3 4.3-4.3v7.2"/>
  </symbol>

  <!-- ⚡ L3 · dual-track bolt (double line = 4 motors), energy gradient -->
  <symbol id="bolt" viewBox="0 0 24 24" fill="url(#lexEnergy)" stroke="none">
    <path d="M13.4 2 5.2 12.6h4.3L8.4 22l8.9-11.4h-4.6L14 2Z"/>
  </symbol>

  <!-- 🅿️ L4 · P in a ring, weight matched to the M -->
  <symbol id="p-roundel" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="9.1"/>
    <path d="M9.6 16.2V7.8h3.1a2.55 2.55 0 0 1 0 5.1H9.6"/>
  </symbol>

  <!-- 🌐 L5 · globe · 2 meridians + a latitude line -->
  <symbol id="globe" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="9"/>
    <path d="M12 3v18M3 12h18"/>
    <path d="M12 3c3 2.4 4.5 5.4 4.5 9s-1.5 6.6-4.5 9c-3-2.4-4.5-5.4-4.5-9s1.5-6.6 4.5-9Z"/>
  </symbol>

  <!-- 🦋 L6 · symmetric butterfly, wing = half-infinity, energy gradient -->
  <symbol id="butterfly" viewBox="0 0 24 24" fill="url(#lexEnergy)" stroke="none">
    <path d="M12 8.3C10.4 4.9 7.4 3 5 4.1 3.1 5 3 7.6 4.9 9.3 3 9.9 2.2 12 3.4 13.7c1.3 1.8 4.4 1.7 6.4-.2 1-1 1.7-2.2 2.2-3.4.5 1.2 1.2 2.4 2.2 3.4 2 1.9 5.1 2 6.4.2 1.2-1.7.4-3.8-1.5-4.4 1.9-1.7 1.8-4.3-.1-5.2C16.6 3 13.6 4.9 12 8.3Z"/>
    <path d="M12 8v10.4" stroke="#03151B" stroke-width="1.1" stroke-linecap="round"/>
    <path d="M12 8c-.5-1.2-1.2-2.1-2-2.6M12 8c.5-1.2 1.2-2.1 2-2.6" fill="none" stroke="#03151B" stroke-width="1" stroke-linecap="round" opacity=".55"/>
  </symbol>

  <!-- P0.3 · line glyphs (stroke 1.75, round) replacing decorative emoji site-wide -->
  <symbol id="cart" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="9" cy="20" r="1.3"/><circle cx="17.5" cy="20" r="1.3"/>
    <path d="M2.5 3.5h2.4l2.2 11.1a1.5 1.5 0 0 0 1.5 1.2h8.3a1.5 1.5 0 0 0 1.5-1.2L20 6.6H6.1"/>
  </symbol>
  <symbol id="handshake" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M2.5 7.5 6 5l4 3.4"/><path d="M21.5 7.5 18 5l-3.4 3.1"/>
    <path d="M10 8.4 8 10.4a1.6 1.6 0 0 0 2.2 2.3l1.3-1.2 3 2.8a1.5 1.5 0 0 0 2.2-2l-.4-.4"/>
    <path d="m18 10.5-4-3.6-2.5 2.3"/>
  </symbol>
  <symbol id="recycle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M9 5.5 11 2.2l2 3.3"/><path d="M11 2.2 7 9l2.6 1.5"/>
    <path d="m19 12.5 2 3.4-3.8.2"/><path d="M21 15.9 17 9l-2.6 1.5"/>
    <path d="M4 18.3H8v-3"/><path d="M8 18.3 4 11.4 1.4 12.9"/>
    <path d="M8 18.3h7l-1.6 2.8"/>
  </symbol>
  <symbol id="gift" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3.5" y="9" width="17" height="11.5" rx="1.4"/><path d="M2.5 9h19M12 9v11.5"/>
    <path d="M12 9c-1.2-3.4-5-3-5-.7 0 1.6 3.1.9 5 .7ZM12 9c1.2-3.4 5-3 5-.7 0 1.6-3.1.9-5 .7Z"/>
  </symbol>
  <symbol id="phone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6.2 3.5h3l1.4 4-2 1.4a11.5 11.5 0 0 0 5.5 5.5l1.4-2 4 1.4v3a2 2 0 0 1-2.2 2A16.5 16.5 0 0 1 4.2 5.7a2 2 0 0 1 2-2.2Z"/>
  </symbol>
  <symbol id="pin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 21.5s7-5.9 7-11.2A7 7 0 1 0 5 10.3c0 5.3 7 11.2 7 11.2Z"/><circle cx="12" cy="10" r="2.6"/>
  </symbol>
  <symbol id="shield" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 2.6 19 5.5v5.2c0 4.7-3 7.9-7 9.4-4-1.5-7-4.7-7-9.4V5.5Z"/><path d="m8.8 12 2.2 2.2 4.2-4.4"/>
  </symbol>
  <symbol id="search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="11" cy="11" r="6.2"/><path d="m20.5 20.5-4.9-4.9"/>
  </symbol>
  <symbol id="trophy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M8 3.5h8v5.2a4 4 0 0 1-8 0Z"/><path d="M8 4.5H4.8v2.1a3 3 0 0 0 3 3M16 4.5h3.2v2.1a3 3 0 0 1-3 3"/>
    <path d="M12 12.7v2.6M9.2 20.5h5.6M10 17.9h4"/>
  </symbol>
  <symbol id="wrench" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M15.5 3.5a4.6 4.6 0 0 0-1.2 8.6L5.2 21l-2.2-2.2 8.9-9.1A4.6 4.6 0 1 1 15.5 3.5Zm.4 1.9-2.1 2.1 1.8 1.8 2.1-2.1"/>
  </symbol>
  <symbol id="percent" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M18.5 5.5 5.5 18.5"/><circle cx="7.3" cy="7.3" r="2.3"/><circle cx="16.7" cy="16.7" r="2.3"/>
  </symbol>
  <symbol id="chat" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 5.5h16A1.5 1.5 0 0 1 21.5 7v7.5A1.5 1.5 0 0 1 20 16H9l-4 3.4V16H4a1.5 1.5 0 0 1-1.5-1.5V7A1.5 1.5 0 0 1 4 5.5Z"/>
    <path d="M7.5 10h9M7.5 12.6h6"/>
  </symbol>
  <symbol id="receipt" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 2.6h12v18.8l-2-1.3-2 1.3-2-1.3-2 1.3-2-1.3V2.6Z"/><path d="M9 7.5h6M9 11h6M9 14.5h4"/>
  </symbol>
  <symbol id="clipboard" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <rect x="5.5" y="4" width="13" height="17.4" rx="2"/><rect x="9" y="2.4" width="6" height="3.4" rx="1.1"/>
    <path d="M9 11h6M9 14.6h6M9 18h4"/>
  </symbol>
  <symbol id="wheel" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3.1"/>
    <path d="M12 3v3.5M12 17.5V21M3 12h3.5M17.5 12H21M5.6 5.6l2.5 2.5M15.9 15.9l2.5 2.5M18.4 5.6l-2.5 2.5M8.1 15.9l-2.5 2.5"/>
  </symbol>
  <symbol id="brake" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="8.6"/><circle cx="12" cy="12" r="3.4"/>
    <path d="M12 3.4v2.8M12 17.8v2.8M3.4 12h2.8M17.8 12h2.8"/>
  </symbol>
</svg>
